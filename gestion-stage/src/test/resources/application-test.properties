# ─── Base de données H2 en mémoire pour les tests ───────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT (clé de test suffisamment longue pour HS256 — 256 bits minimum)
app.jwt.secret=TestSecretKeyForJwtTokenGenerationMustBe256BitsLong!
app.jwt.expiration-ms=3600000

# Upload CV (répertoire temporaire)
app.upload.dir=${java.io.tmpdir}/test-uploads/cv

# Désactiver les logs de sécurité verbeux
logging.level.org.springframework.security=WARN
logging.level.com.stage.backend=WARN
logging.level.org.springframework.web=WARN